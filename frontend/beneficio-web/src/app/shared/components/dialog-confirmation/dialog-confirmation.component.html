<h2 mat-dialog-title class="title-dialog">   
    {{data.title}}
</h2>
<mat-dialog-content>
    {{data.ask}}<strong>{{data.dado}}</strong>?
</mat-dialog-content>
<mat-dialog-actions align="center">
    <button matButton="filled" (click)="dialogRef.close(true)" type="submit">
        <mat-icon>delete</mat-icon>
        Excluir
    </button>
    <button mat-raised-button color="warn" (click)="dialogRef.close(false) ">
        <mat-icon>cancel</mat-icon>Cancelar
    </button>
</mat-dialog-actions>
