
<form class="example-form">
    <mat-card appearance="outlined" class="example-card">
        <mat-card-header>
            <mat-card-title class="title-card">           
                <span>Transferência do Valor de Benefício</span>
            </mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <input-types [(data)]="transferir().fromId" [label]="'Id de um Benefício origem'" [disabled]="ativar()" />
            <input-types [(data)]="transferir().toId" [label]="'Id de um Benefício destino'" [disabled]="ativar()" />            
            <input-moeda-real [(data)]="transferir().amount" [label]="'Valor'" [disabled]="ativar()" />
        </mat-card-content>
        <mat-card-actions>
            <div class="acoes-button">
                <button matButton="filled" (click)="salvar()" type="submit">
                    <mat-icon>save</mat-icon>
                    Salvar
                </button>
                <button mat-raised-button color="warn" (click)="cancelar()" type="button">
                    <mat-icon>cancel</mat-icon>
                    Cancelar
                </button>
            </div>
        </mat-card-actions>
    </mat-card>
</form>
