<table >
    <thead>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Valor</th>
        </tr>
    </thead>
    <tbody>
        @for (beneficio of listBeneficios(); track beneficio.id) {

        <tr>
            <td>{{ beneficio.nome | textoBreve: 20}}</td>
            <td>{{ beneficio.descricao | textoBreve: 15 }}</td>
            <td>{{ beneficio.valor | currency:'BRL'}}</td>
        </tr>
        }
        @empty {
            <tr>
                <td colspan="3">Nenhum benefício encontrado.</td>
            </tr>
        }

    </tbody>
</table>
